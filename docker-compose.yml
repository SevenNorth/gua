services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./deploy/backend.env
    environment:
      WENYAO_HOST: 0.0.0.0
      WENYAO_PORT: 8000
      WENYAO_RELOAD: "false"
    volumes:
      - ./data:/app/data
      - ./public/gua:/app/public/gua:ro
    ports:
      - "127.0.0.1:18000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "uv",
          "run",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "127.0.0.1:18080:80"
    depends_on:
      - backend
    restart: unless-stopped
